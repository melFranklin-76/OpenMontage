name: FISH Shorts Stagger

# Publishes one Short every 2 hours from the previous night's daily-digest
# artifact. The 8 PM CT roundup renders 10 vertical shorts; this workflow
# drips them out across the following day for better algorithm reach.
#
# Hour (UTC) → rank mapping. Starts 8 AM CT (13:00 UTC) the morning after
# the roundup, ends 2 AM CT.

on:
  schedule:
    - cron: "0 13 * * *"   # 8 AM CT  → rank 1
    - cron: "0 15 * * *"   # 10 AM CT → rank 2
    - cron: "0 17 * * *"   # 12 PM CT → rank 3
    - cron: "0 19 * * *"   # 2 PM CT  → rank 4
    - cron: "0 21 * * *"   # 4 PM CT  → rank 5
    - cron: "0 23 * * *"   # 6 PM CT  → rank 6
    - cron: "0 3 * * *"    # 10 PM CT → rank 7
    - cron: "0 5 * * *"    # 12 AM CT → rank 8
    - cron: "0 7 * * *"    # 2 AM CT  → rank 9
    - cron: "0 9 * * *"    # 4 AM CT  → rank 10
  workflow_dispatch:
    inputs:
      rank:
        description: "Story rank to publish (1-10)"
        required: true
        default: "1"

permissions:
  actions: read
  contents: write

jobs:
  publish-short:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: creator-studio
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      IG_USER_ID: ${{ secrets.IG_USER_ID }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Determine rank from schedule hour
        id: rank
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RANK="${{ github.event.inputs.rank }}"
          else
            HOUR=$(date -u +%H)
            case "$HOUR" in
              13) RANK=1 ;;
              15) RANK=2 ;;
              17) RANK=3 ;;
              19) RANK=4 ;;
              21) RANK=5 ;;
              23) RANK=6 ;;
              03) RANK=7 ;;
              05) RANK=8 ;;
              07) RANK=9 ;;
              09) RANK=10 ;;
              *) echo "No rank mapped for hour $HOUR; exiting."; exit 0 ;;
            esac
          fi
          echo "rank=$RANK" >> "$GITHUB_OUTPUT"
          echo "Publishing rank $RANK"

      - name: Skip if no publisher tokens
        if: env.YOUTUBE_TOKEN_JSON == '' && (env.IG_ACCESS_TOKEN == '' || env.IG_USER_ID == '')
        run: |
          echo "No YouTube token and no complete Instagram credentials; nothing to publish."
          exit 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download latest daily artifact
        run: |
          set -euo pipefail

          # Find the most recent successful daily digest run that actually
          # has downloadable artifacts. Push/test-only runs can succeed
          # without producing fish-daily-* artifacts.
          RUN_IDS=$(gh run list \
            --workflow fish-daily-digest.yml \
            --status success \
            --limit 10 \
            --json databaseId \
            --jq '.[].databaseId')

          if [ -z "$RUN_IDS" ]; then
            echo "No successful daily run found; nothing to publish."
            exit 0
          fi

          mkdir -p artifact
          FOUND=0
          for RUN_ID in $RUN_IDS; do
            echo "Trying daily artifact from run $RUN_ID"
            rm -rf artifact/*
            if gh run download "$RUN_ID" -D artifact; then
              if find artifact -type f | grep -q .; then
                FOUND=1
                echo "Downloaded artifact from run $RUN_ID"
                break
              fi
            fi
          done

          if [ "$FOUND" -ne 1 ]; then
            echo "No downloadable daily artifacts found in recent successful runs; nothing to publish."
            exit 0
          fi

          find artifact -maxdepth 3 -type f -print
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --quiet \
            jsonschema pyyaml feedparser pillow \
            google-auth google-auth-oauthlib google-api-python-client

      - name: Publish the short to YouTube
        if: env.YOUTUBE_TOKEN_JSON != ''
        run: |
          RANK="${{ steps.rank.outputs.rank }}"
          DIR=$(ls -d artifact/*/ | head -1)
          SCRIPT="${DIR}fish-script-rank${RANK}.json"
          VIDEO="${DIR}fish-reel-rank${RANK}.mp4"
          MANIFEST="${DIR}fish-reel-rank${RANK}.media.json"
          if [ ! -f "$SCRIPT" ] || [ ! -f "$VIDEO" ]; then
            echo "Rank ${RANK} script or video missing in artifact; skipping YouTube."
            exit 0
          fi
          python -m studio.fish.youtube_publisher \
            --script "$SCRIPT" \
            --video "$VIDEO" \
            --media-manifest "$MANIFEST" \
            --format short \
            --privacy public \
            --output "fish-youtube-short-rank${RANK}.json"
          cat "fish-youtube-short-rank${RANK}.json"

      - name: Publish top 3 shorts to Instagram Reels
        if: env.IG_ACCESS_TOKEN != '' && env.IG_USER_ID != ''
        run: |
          set -euo pipefail
          RANK="${{ steps.rank.outputs.rank }}"
          if [ "$RANK" -gt 3 ]; then
            echo "Rank ${RANK} is outside Instagram top-3; skipping."
            exit 0
          fi
          DIR=$(ls -d artifact/*/ | head -1)
          SCRIPT="${DIR}fish-script-rank${RANK}.json"
          if [ ! -f "$SCRIPT" ]; then
            echo "Rank ${RANK} script missing in artifact; skipping Instagram."
            exit 0
          fi
          TAG="fish-daily-$(TZ=America/Chicago date -d 'yesterday' +%Y-%m-%d)"
          VIDEO_URL="https://github.com/melFranklin-76/OpenMontage/releases/download/${TAG}/fish-reel-rank${RANK}.mp4"
          python -m studio.fish.instagram_publisher \
            --script "$SCRIPT" \
            --video-url "$VIDEO_URL" \
            --media-manifest "${DIR}fish-reel-rank${RANK}.media.json" \
            --output "fish-ig-rank${RANK}.json"
          cat "fish-ig-rank${RANK}.json"

      - name: Cleanup old FISH daily releases
        if: always() && steps.rank.outputs.rank == '10'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '7 days ago' +%s)
          gh release list --limit 100 --json tagName,createdAt,isPrerelease \
          | jq -r '.[] | select(.isPrerelease == true) | select(.tagName | startswith("fish-daily-")) | [.tagName, .createdAt] | @tsv' \
          | while IFS=$'\t' read -r TAG CREATED; do
              CREATED_TS=$(date -u -d "$CREATED" +%s)
              if [ "$CREATED_TS" -lt "$CUTOFF" ]; then
                echo "Deleting old release $TAG"
                gh release delete "$TAG" --yes --cleanup-tag || true
              fi
            done

      - name: Upload publish receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fish-short-publish-${{ github.run_id }}
          path: |
            fish-youtube-short-rank*.json
            fish-ig-rank*.json
          retention-days: 14
          if-no-files-found: ignore
