name: FISH Daily Digest

on:
  schedule:
    - cron: "0 11 * * *"   # 6:00 AM CT
    - cron: "0 17 * * *"   # 12:00 PM CT
    - cron: "0 1 * * *"    # 8:00 PM CT
  workflow_dispatch:
  push:
    paths:
      - "creator-studio/studio/fish/**"
      - "tests/creator_studio/fish/**"
      - "creator-studio/out/fish/sample_stories.json"
      - ".github/workflows/fish-daily-digest.yml"
  pull_request:
    paths:
      - "creator-studio/studio/fish/**"
      - "tests/creator_studio/fish/**"
      - "creator-studio/out/fish/sample_stories.json"
      - ".github/workflows/fish-daily-digest.yml"

jobs:
  fish-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: creator-studio

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema pyyaml feedparser

      - name: Run FISH tests
        run: |
          python -m pytest tests/creator_studio/fish -q

      - name: Generate sample FISH digest
        run: |
          python -m studio.fish.daily_digest \
            --input creator-studio/out/fish/sample_stories.json \
            --output creator-studio/out/fish/daily_story_candidates.example.json

      - name: Show generated digest
        run: |
          cat creator-studio/out/fish/daily_story_candidates.example.json

  fish-live-digest:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: creator-studio

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (ffmpeg, piper)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core

      - name: Install Piper TTS
        run: |
          PIPER_URL="https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz"
          curl -sL "$PIPER_URL" | sudo tar -xz -C /opt
          sudo ln -sf /opt/piper/piper /usr/local/bin/piper
          piper --help >/dev/null 2>&1 || true

      - name: Download Piper voice models (lessac/amy/ryan)
        run: |
          mkdir -p "$HOME/.piper/models"
          BASE="https://huggingface.co/rhasspy/piper-voices/resolve/main"
          for VOICE in \
            "en/en_US/lessac/medium/en_US-lessac-medium" \
            "en/en_US/amy/medium/en_US-amy-medium" \
            "en/en_US/ryan/high/en_US-ryan-high"; do
            NAME=$(basename "$VOICE")
            curl -sL "$BASE/${VOICE}.onnx" -o "$HOME/.piper/models/${NAME}.onnx"
            curl -sL "$BASE/${VOICE}.onnx.json" -o "$HOME/.piper/models/${NAME}.onnx.json"
          done
          ls -la "$HOME/.piper/models/"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install feedparser jsonschema pyyaml pillow

      - name: Run live daily digest
        run: |
          python -m studio.fish.daily_digest \
            --live \
            --social \
            --output fish-digest-$(date -u +%Y-%m-%d).json

      - name: Show today's top stories
        run: |
          python -c "
          import json, sys
          data = json.load(open(sys.argv[1]))
          print(f'Date: {data[\"date\"]}')
          print(f'Total candidates: {len(data[\"items\"])}')
          print()
          for i, item in enumerate(data['items'][:10], 1):
              print(f'{i}. [{item[\"matched_lane\"]}] {item[\"title\"]}')
              print(f'   Score: {item[\"relevance_score\"]:.2f} | {item[\"source\"]}')
              print(f'   {item[\"url\"]}')
              print()
          " fish-digest-*.json

      - name: Generate reel scripts for top 3 stories
        run: |
          DIGEST=$(ls fish-digest-*.json | head -1)
          for RANK in 1 2 3; do
            python -m studio.fish.research_handoff \
              --digest "$DIGEST" --rank "$RANK" \
              --output "fish-handoff-rank${RANK}.json" 2>/dev/null || continue
            python -m studio.fish.reel_script \
              --handoff "fish-handoff-rank${RANK}.json" \
              --output "fish-script-rank${RANK}.json" 2>/dev/null || true
          done
          echo "Generated scripts:"
          ls -la fish-script-rank*.json 2>/dev/null || echo "No scripts generated"

      - name: Show generated scripts
        run: |
          for f in fish-script-rank*.json; do
            [ -f "$f" ] || continue
            python -c "
          import json, sys
          s = json.load(open(sys.argv[1]))
          print(f'Rank {sys.argv[1]}: [{s[\"lane\"]}] {s[\"topic\"]}')
          total = sum(sec[\"duration_seconds\"] for sec in s[\"sections\"])
          print(f'  {total}s, {len(s[\"sections\"])} sections')
          print()
          " "$f"
          done

      - name: Render top-ranked reel to MP4
        run: |
          for RANK in 1 2 3; do
            SCRIPT="fish-script-rank${RANK}.json"
            [ -f "$SCRIPT" ] || continue
            python -m studio.fish.reel_render \
              --script "$SCRIPT" \
              --output "fish-reel-rank${RANK}.mp4" 2>&1 | tail -20 || true
          done
          echo "Rendered reels:"
          ls -la fish-reel-rank*.mp4 2>/dev/null || echo "No reels rendered"

      - name: Upload digest, scripts, and reels
        uses: actions/upload-artifact@v4
        with:
          name: fish-daily-${{ github.run_id }}
          path: |
            fish-digest-*.json
            fish-script-rank*.json
            fish-reel-rank*.mp4
          retention-days: 30
